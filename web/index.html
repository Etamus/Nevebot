<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neve Bot</title>
  <style>
    /* ── Reset & Variáveis ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0f13;
      --surface:  #16181f;
      --card:     #1d1f29;
      --border:   #2a2d3a;
      --accent:   #7c6fcd;
      --accent2:  #5865f2;
      --text:     #e2e4ed;
      --muted:    #8b8fa8;
      --success:  #3ba55c;
      --error:    #ed4245;
      --radius:   10px;
      --shadow:   0 4px 20px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .header-logo .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .btn-save-top {
      padding: .45rem 1.2rem;
      border-radius: 6px;
      border: none;
      background: var(--accent2);
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-save-top:hover { opacity: .85; }
    .btn-save-top:active { transform: scale(.97); }

    .btn-shutdown {
      padding: .45rem 1.2rem;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--error);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--error);
      transition: background .15s, transform .1s;
    }
    .btn-shutdown:hover { background: rgba(237,66,69,.12); }
    .btn-shutdown:active { transform: scale(.97); }

    main { flex: 1; max-width: 900px; margin: 2rem auto; padding: 0 1.5rem 4rem; width: 100%; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      padding: .75rem 1.4rem;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { background: var(--success); color: #fff; }
    #toast.err { background: var(--error);   color: #fff; }

    /* ── Seção Geral ─────────────────────────────────────────────────────── */
    .section-title {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .75rem;
      margin-top: 2rem;
    }

    .general-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .general-card label { font-size: .9rem; color: var(--muted); white-space: nowrap; }

    .input-prefix {
      width: 80px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .45rem .7rem;
      color: var(--text);
      font-size: 1rem;
      font-family: monospace;
      outline: none;
      transition: border-color .15s;
    }
    .input-prefix:focus { border-color: var(--accent); }

    /* ── Grid de comandos ────────────────────────────────────────────────── */
    .cmd-grid {
      display: grid;
      gap: 1rem;
    }

    /* ── Card de comando ─────────────────────────────────────────────────── */
    .cmd-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .cmd-header {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .9rem 1.2rem;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: border-color .15s;
    }
    .cmd-card.open .cmd-header { border-bottom-color: var(--border); }

    .cmd-tag {
      font-size: .72rem;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: .05em;
      background: rgba(124, 111, 205, .18);
      color: var(--accent);
      padding: .2rem .55rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .cmd-desc { font-size: .85rem; color: var(--muted); flex: 1; }

    .chevron {
      width: 16px; height: 16px;
      color: var(--muted);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .cmd-card.open .chevron { transform: rotate(180deg); }

    .cmd-body { display: none; padding: 1.1rem 1.2rem; }
    .cmd-card.open .cmd-body { display: block; }

    /* ── Campos dentro do card ───────────────────────────────────────────── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .35rem;
    }

    .badge-name {
      background: rgba(88, 101, 242, .2);
      color: var(--accent2);
      font-size: .68rem;
      padding: .1rem .4rem;
      border-radius: 3px;
      font-weight: 700;
    }

    .badge-msg {
      background: rgba(59, 165, 92, .15);
      color: #3ba55c;
      font-size: .68rem;
      padding: .1rem .4rem;
      border-radius: 3px;
      font-weight: 700;
    }

    .input-name, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .5rem .75rem;
      color: var(--text);
      font-size: .9rem;
      font-family: monospace;
      outline: none;
      transition: border-color .15s;
      resize: vertical;
    }
    .input-name:focus, textarea:focus { border-color: var(--accent); }

    textarea { min-height: 56px; line-height: 1.4; }

    .hint {
      font-size: .73rem;
      color: var(--muted);
      margin-top: .3rem;
      font-style: italic;
    }

    /* ── Vars disponíveis ────────────────────────────────────────────────── */
    .vars {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
      margin-top: .3rem;
    }

    .var-chip {
      font-family: monospace;
      font-size: .73rem;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .1rem .4rem;
      color: var(--muted);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: .9rem 0;
    }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 4rem 2rem;
      font-size: .95rem;
    }

    /* ── Seção Voz ───────────────────────────────────────────────────────── */
    .voz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.3rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
    }

    .voz-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .voz-label {
      font-size: .82rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      min-width: 130px;
    }

    .voz-section-title {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: .4rem;
    }

    /* Botão microfone */
    .mic-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      background: var(--accent2);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(88,101,242,.35);
    }
    .mic-btn svg { width: 32px; height: 32px; }
    .mic-btn:hover { background: #4752c4; transform: scale(1.06); }
    .mic-btn:active { transform: scale(.96); }
    .mic-btn.recording {
      background: var(--error);
      box-shadow: 0 0 0 6px rgba(237,66,69,.25), 0 4px 16px rgba(237,66,69,.4);
      animation: pulse-rec .9s infinite;
    }
    .mic-btn.processing {
      background: #555;
      box-shadow: none;
      cursor: default;
    }
    @keyframes pulse-rec {
      0%,100% { box-shadow: 0 0 0 6px rgba(237,66,69,.25), 0 4px 16px rgba(237,66,69,.4); }
      50%      { box-shadow: 0 0 0 12px rgba(237,66,69,.1), 0 4px 16px rgba(237,66,69,.4); }
    }

    .voz-status {
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
    }

    .voz-transcript, .voz-response {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .65rem .9rem;
      font-size: .9rem;
      color: var(--text);
      min-height: 2.4rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .voz-transcript { color: var(--muted); font-style: italic; }
    .voz-response { color: var(--text); }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: .75rem; }
    .toggle { position: relative; width: 46px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #3a3d4e;
      border-radius: 26px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--success); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* Sliders */
    .voz-slider-wrap { display: flex; align-items: center; gap: .7rem; flex: 1; min-width: 200px; }
    .voz-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .voz-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: background .15s;
    }
    .voz-slider:hover::-webkit-slider-thumb { background: var(--accent2); }
    .voz-slider-val {
      font-size: .82rem;
      font-family: monospace;
      color: var(--text);
      min-width: 32px;
      text-align: right;
    }

    /* Select de voz */
    .voz-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .4rem .7rem;
      color: var(--text);
      font-size: .88rem;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
    }
    .voz-select:focus { border-color: var(--accent); }

    .voz-save-btn {
      padding: .38rem 1rem;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .voz-save-btn:hover { opacity: .82; }
    .voz-save-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }
    .voz-save-btn.gravando {
      background: var(--error);
      animation: pulso-rec .9s ease-in-out infinite alternate;
    }
    @keyframes pulso-rec {
      from { box-shadow: 0 0 0px var(--error); }
      to   { box-shadow: 0 0 10px var(--error); }
    }

    /* ── Chat de Voz ─────────────────────────────────────────────────────── */
    .voice-chat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .voice-chat-messages {
      flex: 1;
      min-height: 200px;
      max-height: 420px;
      overflow-y: auto;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }
    .voice-chat-messages::-webkit-scrollbar { width: 6px; }
    .voice-chat-messages::-webkit-scrollbar-track { background: transparent; }
    .voice-chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .voice-msg {
      max-width: 85%;
      padding: .55rem .9rem;
      border-radius: 12px;
      font-size: .9rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .voice-msg.user {
      align-self: flex-end;
      background: var(--accent2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .voice-msg.bot {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .voice-msg .msg-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      opacity: .7;
      margin-bottom: .2rem;
    }

    .voice-chat-empty {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: .88rem;
    }

    .voice-chat-bar {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .8rem 1.2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .voice-chat-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .5rem .8rem;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
    }
    .voice-chat-input:focus { border-color: var(--accent); }
    .voice-chat-input::placeholder { color: var(--muted); }

    .voice-send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: none;
      background: var(--accent2);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .voice-send-btn:hover { opacity: .85; }
    .voice-send-btn:disabled { opacity: .35; cursor: not-allowed; }

    .voice-clear-btn {
      padding: .3rem .8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .78rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .voice-clear-btn:hover { color: var(--error); border-color: var(--error); }

    /* ── Voice Chat Header ──────────────────────────────────────────────── */
    .voice-chat-header {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.12);
    }

    .voice-chat-header-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .voice-chat-header-icon svg { width: 20px; height: 20px; }

    .voice-chat-header-text { flex: 1; min-width: 0; }
    .voice-chat-header-text h3 {
      font-size: .95rem;
      font-weight: 700;
      margin: 0;
      line-height: 1.2;
    }
    .voice-chat-header-text span {
      font-size: .75rem;
      color: var(--muted);
    }

    .voice-chat-header-actions {
      display: flex;
      align-items: center;
      gap: .6rem;
      flex-shrink: 0;
    }

    .voice-status-pill {
      font-size: .72rem;
      font-weight: 600;
      color: var(--accent);
      background: rgba(124,111,205,.12);
      padding: .2rem .7rem;
      border-radius: 999px;
      white-space: nowrap;
    }
    .voice-status-pill:empty { display: none; }

    /* ── Botão microfone (barra de input) ─────────────────────────────────── */
    .voice-mic-small {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--accent2);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background .2s, transform .15s, box-shadow .2s;
    }
    .voice-mic-small svg { width: 20px; height: 20px; }
    .voice-mic-small:hover { background: #4752c4; transform: scale(1.08); }
    .voice-mic-small:active { transform: scale(.94); }
    .voice-mic-small.recording {
      background: var(--error);
      box-shadow: 0 0 0 5px rgba(237,66,69,.2);
      animation: pulse-rec .9s infinite;
    }
    .voice-mic-small.processing {
      background: #555;
      cursor: default;
      box-shadow: none;
    }

    /* ── Push-to-Talk toggle ─────────────────────────────────────────────── */
    .voice-ptt-toggle {
      display: flex;
      align-items: center;
      gap: .3rem;
      padding: .3rem .6rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .voice-ptt-toggle:hover { border-color: var(--accent); color: var(--text); }
    .voice-ptt-toggle.active {
      background: rgba(88,101,242,.15);
      border-color: var(--accent2);
      color: var(--accent2);
    }
    .voice-ptt-toggle.active:hover { background: rgba(88,101,242,.25); }

    /* ── Empty state icon ────────────────────────────────────────────────── */
    .voice-chat-empty-icon {
      margin-bottom: .5rem;
      opacity: .6;
    }

    /* ── Settings panel (grid) ────────────────────────────────────────────── */
    .voice-settings-panel {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: .5rem .9rem;
      align-items: center;
      padding: .8rem 1.2rem;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,.15);
    }

    .vs-label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      white-space: nowrap;
    }

    .vs-control {
      min-width: 0;
    }
    .vs-control .input-name {
      width: 100%; max-width: 260px;
      font-size: .82rem;
      padding: .35rem .6rem;
      font-family: inherit;
    }

    .vs-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      padding-top: .3rem;
    }

    .voice-settings-row {
      display: flex;
      align-items: center;
      gap: .8rem;
      flex-wrap: wrap;
      padding: .6rem 1.2rem;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,.15);
    }

    .voice-settings-row .voz-label { min-width: auto; font-size: .75rem; }
    .voice-settings-row .voz-select { font-size: .8rem; padding: .3rem .5rem; }
    .voice-settings-row .input-name {
      width: 200px; font-size: .8rem; padding: .3rem .6rem; font-family: inherit;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-logo">
      <span class="dot"></span>
      Neve Bot
    </div>
    <div style="display:flex;gap:.6rem;">
      <button class="btn-shutdown" onclick="desligar()">Desligar</button>
      <button class="btn-save-top" onclick="salvar()">Salvar alterações</button>
    </div>
  </header>

  <main>
    <div id="content" class="loading">Carregando configurações...</div>
  </main>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Labels humanos para cada chave de mensagem ──────────────────────────────
const MSG_LABELS = {
  ja_ativo:      "Resposta quando já está ativo",
  ativado:       "Resposta ao ativar",
  ja_desligado:  "Resposta quando já está desligado",
  desligado:     "Resposta ao desligar",
  apagado:       "Resposta ao apagar histórico",
  info:          "Texto de informação",
  pong:          "Resposta do ping",
  sem_msgs:      "Sem mensagens para processar",
  erro:          "Mensagem de erro",
  resultado:     "Template do resultado",
  sem_mencao:    "Sem menção de usuário",
  poucas_msgs:   "Poucas mensagens encontradas",
  cabecalho:     "Cabeçalho do resultado",
  auto_bloqueio: "Tentativa de auto-bloqueio",
  bloquear_bot:  "Tentativa de bloquear o bot",
  bloqueado:     "Usuário bloqueado com sucesso",
  desbloqueado:  "Usuário desbloqueado com sucesso",
  nao_bloqueado: "Usuário não estava bloqueado",

async function carregarCanaisVoz() {
  const guildSel = document.getElementById('voz-guild');
  const canalSel = document.getElementById('voz-canal');
  if (!guildSel || !canalSel) return;
  const guildId = guildSel.value;
  if (!guildId) return;
  canalSel.innerHTML = '<option value="">Carregando...</option>';
  try {
    const r = await fetch(`/api/voz/canais?guild_id=${guildId}`);
    const canais = await r.json();
    if (!canais.length) {
      canalSel.innerHTML = '<option value="">Nenhum canal de voz</option>';
    } else {
      canalSel.innerHTML = canais.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
    }
    // Reflete estado atual (bot já conectado?)
    const guild = (_guilds || []).find(g => g.id === guildId);
    const btnCon = document.getElementById('voz-btn-conectar');
    const btnDis = document.getElementById('voz-btn-desconectar');
    if (guild?.canal_id) {
      const opt = [...canalSel.options].find(o => o.value === guild.canal_id);
      if (opt) canalSel.value = guild.canal_id;
      if (btnCon) btnCon.style.display = 'none';
      if (btnDis) btnDis.style.display = '';
    } else {
      if (btnCon) btnCon.style.display = '';
      if (btnDis) btnDis.style.display = 'none';
    }
  } catch(e) {
    canalSel.innerHTML = '<option value="">Erro ao carregar</option>';
  }
}

async function conectarVoz() {
  const guildId   = document.getElementById('voz-guild')?.value;
  const channelId = document.getElementById('voz-canal')?.value;
  if (!guildId || !channelId) { toast('Selecione um canal de voz.', 'err'); return; }
  const btn = document.getElementById('voz-btn-conectar');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch('/api/voz/conectar', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ guild_id: guildId, channel_id: channelId }),
    });
    const res = await r.json();
    if (res.ok) {
      const g = (_guilds || []).find(g => g.id === guildId);
      if (g) { g.em_voz = true; g.canal_id = channelId; }
      if (btn) { btn.style.display = 'none'; btn.disabled = false; }
      const dis = document.getElementById('voz-btn-desconectar');
      if (dis) dis.style.display = '';
      toast('Bot conectado ao canal de voz!', 'ok');
    } else {
      toast('Erro: ' + (res.erro || '?'), 'err');
      if (btn) btn.disabled = false;
    }
  } catch(e) {
    toast('Falha ao conectar: ' + e.message, 'err');
    if (btn) btn.disabled = false;
  }
}

async function desconectarVoz() {
  const guildId = document.getElementById('voz-guild')?.value;
  if (!guildId) return;
  const btn = document.getElementById('voz-btn-desconectar');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch('/api/voz/desconectar', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ guild_id: guildId }),
    });
    const res = await r.json();
    if (res.ok) {
      const g = (_guilds || []).find(g => g.id === guildId);
      if (g) { g.em_voz = false; g.canal_id = null; }
      if (btn) { btn.style.display = 'none'; btn.disabled = false; }
      const con = document.getElementById('voz-btn-conectar');
      if (con) con.style.display = '';
      toast('Bot desconectado do canal de voz.', 'ok');
    } else {
      toast('Erro: ' + (res.erro || '?'), 'err');
      if (btn) btn.disabled = false;
    }
  } catch(e) {
    toast('Falha ao desconectar: ' + e.message, 'err');
    if (btn) btn.disabled = false;
  }
}

// ── Gravação de áudio via AudioContext (sem FFmpeg) ──────────────────────────
async function toggleGravacao() {
  if (_vozProcessing) return;
  if (_vozRecording) {
    pararGravacao();
  } else {
    await iniciarGravacao();
  }
}

async function iniciarGravacao() {
  try {
    _vozMediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _vozAudioCtx = new AudioContext();
    _vozSourceNode = _vozAudioCtx.createMediaStreamSource(_vozMediaStream);
    _vozProcessorNode = _vozAudioCtx.createScriptProcessor(4096, 1, 1);
    _vozChunks = [];

    _vozProcessorNode.onaudioprocess = (e) => {
      if (_vozRecording) {
        _vozChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
      }
    };

    _vozSourceNode.connect(_vozProcessorNode);
    _vozProcessorNode.connect(_vozAudioCtx.destination);
    _vozRecording = true;

    const btn = document.getElementById('voice-mic-btn');
    if (btn) btn.classList.add('recording');
    setVoiceStatus('Gravando...');
  } catch(e) {
    toast('Erro ao acessar microfone: ' + e.message, 'err');
  }
}

async function pararGravacao() {
  _vozRecording = false;
  _vozProcessing = true;

  const btn = document.getElementById('voice-mic-btn');
  if (btn) { btn.classList.remove('recording'); btn.classList.add('processing'); }
  setVoiceStatus('Processando...');

  // Limpa áudio
  if (_vozProcessorNode) _vozProcessorNode.disconnect();
  if (_vozSourceNode) _vozSourceNode.disconnect();
  if (_vozMediaStream) _vozMediaStream.getTracks().forEach(t => t.stop());

  // Merge chunks
  const totalLen = _vozChunks.reduce((a, c) => a + c.length, 0);
  if (totalLen < 1600) { // muito curto
    _vozProcessing = false;
    if (btn) btn.classList.remove('processing');
    setVoiceStatus('');
    return;
  }

  const merged = new Float32Array(totalLen);
  let offset = 0;
  for (const ch of _vozChunks) { merged.set(ch, offset); offset += ch.length; }
  _vozChunks = [];

  // Codifica como WAV
  const sampleRate = _vozAudioCtx ? _vozAudioCtx.sampleRate : 44100;
  const wavBlob = encodeWAV(merged, sampleRate);
  if (_vozAudioCtx) { _vozAudioCtx.close(); _vozAudioCtx = null; }

  // Envia ao servidor
  try {
    setVoiceStatus('Transcrevendo e gerando resposta...');
    const r = await fetch('/api/voz/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'audio/wav' },
      body: wavBlob,
    });
    const res = await r.json();
    if (res.transcript) adicionarMsgChat('user', res.transcript);
    if (res.resposta) adicionarMsgChat('bot', res.resposta);
    if (res.falou_discord) setVoiceStatus('Falando no Discord...');
    else setVoiceStatus('');
  } catch(e) {
    toast('Erro no chat de voz: ' + e.message, 'err');
    setVoiceStatus('');
  }

  _vozProcessing = false;
  if (btn) btn.classList.remove('processing');
  setTimeout(() => setVoiceStatus(''), 3000);
}

// ── Enviar texto digitado ───────────────────────────────────────────────────
async function enviarTextoVoz() {
  const input = document.getElementById('voice-chat-input');
  const texto = input?.value?.trim();
  if (!texto || _vozProcessing) return;

  input.value = '';
  _vozProcessing = true;
  adicionarMsgChat('user', texto);
  setVoiceStatus('Gerando resposta...');

  const sendBtn = document.getElementById('voice-send-btn');
  if (sendBtn) sendBtn.disabled = true;

  try {
    const r = await fetch('/api/voz/chat-texto', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ texto }),
    });
    const res = await r.json();
    if (res.resposta) adicionarMsgChat('bot', res.resposta);
    if (res.falou_discord) setVoiceStatus('Falando no Discord...');
    else if (res.erro) toast('Erro: ' + res.erro, 'err');
    else setVoiceStatus('');
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  }

  _vozProcessing = false;
  if (sendBtn) sendBtn.disabled = false;
  setTimeout(() => setVoiceStatus(''), 3000);
}

function adicionarMsgChat(role, texto) {
  const container = document.getElementById('voice-chat-msgs');

  if (empty) empty.style.display = 'none';

  const div = document.createElement('div');
  div.className = 'voice-msg ' + role;
  const label = role === 'user' ? 'Você' : 'Neve';
  div.innerHTML = `<div class="msg-label">${label}</div>${esc(texto)}`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div>Clique no microfone ou digite para conversar.</div>
      <div style="font-size:.75rem;color:var(--muted);opacity:.7">A Neve vai responder no canal de voz do Discord.</div>
    </div>`;
  try { await fetch('/api/voz/limpar', { method: 'POST' }); } catch(e) {}
  toast('Histórico de voz limpo.', 'ok');
}

// ── Push-to-Talk ────────────────────────────────────────────────────────────
let _pttPollInterval = null;
let _pttGlobalAnterior = false;  // estado anterior do PTT global

function togglePTT() {
  _pttEnabled = !_pttEnabled;
  const btn = document.getElementById('ptt-toggle');
  const label = document.getElementById('ptt-label');
  if (btn) btn.classList.toggle('active', _pttEnabled);
  if (label) label.textContent = _pttEnabled ? 'PTT ON' : 'PTT';
  if (_pttEnabled) {
    toast('Push-to-Talk ativado — segure Shift direito para falar (funciona fora do navegador)', 'ok');
    _iniciarPollingPTT();
  } else {
    toast('Push-to-Talk desativado', 'ok');
    _pararPollingPTT();
    if (_pttKeyHeld && _vozRecording) {
      _pttKeyHeld = false;
      pararGravacao();
    }
  }
}

function _iniciarPollingPTT() {
  if (_pttPollInterval) return;
  _pttGlobalAnterior = false;
  _pttPollInterval = setInterval(async () => {
    if (!_pttEnabled) return;
    try {
      const r = await fetch('/api/voz/ptt-estado');
      const data = await r.json();
      const agora = data.pressionado;
      if (agora && !_pttGlobalAnterior && !_pttKeyHeld && !_vozProcessing) {
        _pttKeyHeld = true;
        iniciarGravacao();
      } else if (!agora && _pttGlobalAnterior && _pttKeyHeld) {
        _pttKeyHeld = false;
        if (_vozRecording) pararGravacao();
      }
      _pttGlobalAnterior = agora;
    } catch(e) {}
  }, 100);
}

function _pararPollingPTT() {
  if (_pttPollInterval) {
    clearInterval(_pttPollInterval);
    _pttPollInterval = null;
  }
  _pttGlobalAnterior = false;
}

document.addEventListener('keydown', (e) => {
  if (!_pttEnabled || _pttKeyHeld || _vozProcessing) return;
  if (e.code === 'ShiftRight') {
    e.preventDefault();
    _pttKeyHeld = true;
    iniciarGravacao();
  }
});

document.addEventListener('keyup', (e) => {
  if (!_pttEnabled || !_pttKeyHeld) return;
  if (e.code === 'ShiftRight') {
    e.preventDefault();
    _pttKeyHeld = false;
    if (_vozRecording) pararGravacao();
  }
});

// Segurança: se a janela perder foco, o polling cuida do PTT global
window.addEventListener('blur', () => {
  // Não para a gravação no blur — o polling global continua funcionando
});

// ── Codificação WAV (sem FFmpeg) ────────────────────────────────────────────
function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);
  writeWAVStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + samples.length * 2, true);
  writeWAVStr(view, 8, 'WAVE');
  writeWAVStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);   // PCM
  view.setUint16(22, 1, true);   // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);   // block align
  view.setUint16(34, 16, true);  // bits per sample
  writeWAVStr(view, 36, 'data');
  view.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

function writeWAVStr(view, offset, str) {
  for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

// ── Cards de comando ─────────────────────────────────────────────────────────
function buildBody(cmdKey, cmdData) {
  let html = '';

  // Campo do nome do comando
  html += `
    <div class="field">
      <div class="field-label">
        Nome do comando
        <span class="badge-name">NOME</span>
      </div>
      <input class="input-name" type="text"
             data-cmd="${esc(cmdKey)}" data-field="name"
             value="${esc(cmdData.name)}" />
      <div class="hint">Texto que os usuários digitam após o prefixo. Reinício aplica ao Discord.</div>
    </div>`;

  if (Object.keys(cmdData.messages || {}).length > 0) {
    html += '<div class="divider"></div>';
  }

  // Campos de mensagem
  for (const [msgKey, msgVal] of Object.entries(cmdData.messages || {})) {
    const label = MSG_LABELS[msgKey] || msgKey;
    const vars  = MSG_VARS[msgKey] || [];
    const varHtml = vars.length
      ? `<div class="vars">${vars.map(v => `<span class="var-chip">${esc(v)}</span>`).join('')}</div>`
      : '';

    html += `
      <div class="field">
        <div class="field-label">
          ${esc(label)}
          <span class="badge-msg">MENSAGEM</span>
        </div>
        <textarea data-cmd="${esc(cmdKey)}" data-field="msg_${esc(msgKey)}"
                  rows="2">${esc(msgVal)}</textarea>
        ${varHtml ? `<div class="hint">Variáveis: ${varHtml}</div>` : ''}
      </div>`;
  }

  return html;
}

// ── Coleta os valores do formulário ────────────────────────────────────────
function coletar() {
  const nova = JSON.parse(JSON.stringify(_config)); // deep clone

  // Prefixo
  const pInput = document.getElementById('inp-prefix');
  if (pInput) nova.prefix = pInput.value.trim() || '!';

  // Campos dos cards
  document.querySelectorAll('[data-cmd]').forEach(el => {
    const cmdKey = el.dataset.cmd;
    const field  = el.dataset.field;

    if (field === 'name') {
      nova.commands[cmdKey].name = el.value.trim() || cmdKey;
    } else if (field.startsWith('msg_')) {
      const msgKey = field.slice(4);
      nova.commands[cmdKey].messages[msgKey] = el.value;
    }
  });

  return nova;
}

// ── Salva no servidor ──────────────────────────────────────────────────────
async function salvar() {
  const nova = coletar();
  try {
    const r = await fetch('/api/config', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(nova),
    });
    const res = await r.json();
    if (res.ok) {
      _config = nova;
      // Atualiza os tags de prefixo/nome nos headers sem re-renderizar tudo
      atualizarTags(nova);
      toast('Configurações salvas com sucesso!', 'ok');
    } else {
      toast('Erro ao salvar: ' + (res.erro || 'desconhecido'), 'err');
    }
  } catch(e) {
    toast('Falha de conexão com o servidor.', 'err');
  }
}

function atualizarTags(cfg) {
  document.querySelectorAll('.cmd-card').forEach(card => {
    const key = card.dataset.key;
    const tag = card.querySelector('.cmd-tag');
    if (tag && cfg.commands[key]) {
      tag.textContent = cfg.prefix + cfg.commands[key].name;
    }
  });
}

// ── Toggle card ────────────────────────────────────────────────────────────
function toggleCard(card) {
  card.classList.toggle('open');
}

// ── Desligar bot ───────────────────────────────────────────────────────────
async function desligar() {
  if (!confirm('Tem certeza que deseja desligar o bot?')) return;
  try {
    await fetch('/api/shutdown', { method: 'POST' });
    toast('Bot desligado.', 'err');
    document.querySelector('.dot').style.background = 'var(--error)';
    document.querySelector('.dot').style.boxShadow = '0 0 8px var(--error)';
  } catch(e) {
    toast('Falha ao desligar.', 'err');
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────
let _toastTimer = null;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Escape HTML ────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Suporte a Ctrl+S ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    salvar();
  }
});

// Inicia
carregar();
