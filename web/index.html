<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neve Bot</title>
  <style>
    /* ── Reset & Variáveis ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0e0f13;
      --surface:  #16181f;
      --card:     #1d1f29;
      --border:   #2a2d3a;
      --accent:   #7c6fcd;
      --accent2:  #5865f2;
      --text:     #e2e4ed;
      --muted:    #8b8fa8;
      --success:  #3ba55c;
      --error:    #ed4245;
      --radius:   10px;
      --shadow:   0 4px 20px rgba(0,0,0,.4);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .02em;
    }

    .header-logo-img {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      object-fit: cover;
      display: block;
      background: #fff;
      box-shadow: 0 0 0 1px rgba(255,255,255,.10), 0 6px 18px rgba(0,0,0,.24);
    }

    .btn-save-top {
      padding: .45rem 1.2rem;
      border-radius: 6px;
      border: none;
      background: var(--accent2);
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-save-top:hover { opacity: .85; }
    .btn-save-top:active { transform: scale(.97); }

    .btn-shutdown {
      padding: .45rem 1.2rem;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--error);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--error);
      transition: background .15s, transform .1s;
    }
    .btn-shutdown:hover { background: rgba(237,66,69,.12); }
    .btn-shutdown:active { transform: scale(.97); }

    main { flex: 1; max-width: 900px; margin: 2rem auto; padding: 0 1.5rem 4rem; width: 100%; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      padding: .75rem 1.4rem;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok  { background: var(--success); color: #fff; }
    #toast.err { background: var(--error);   color: #fff; }

    /* ── Seção Geral ─────────────────────────────────────────────────────── */
    .section-title {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .75rem;
      margin-top: 2rem;
    }

    .general-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .general-card label { font-size: .9rem; color: var(--muted); white-space: nowrap; }

    .input-prefix {
      width: 80px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .45rem .7rem;
      color: var(--text);
      font-size: 1rem;
      font-family: monospace;
      outline: none;
      transition: border-color .15s;
    }
    .input-prefix:focus { border-color: var(--accent); }

    /* ── Grid de comandos ────────────────────────────────────────────────── */
    .cmd-grid {
      display: grid;
      gap: 1rem;
    }

    /* ── Card de comando ─────────────────────────────────────────────────── */
    .cmd-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .cmd-header {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .9rem 1.2rem;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
      transition: border-color .15s;
    }
    .cmd-card.open .cmd-header { border-bottom-color: var(--border); }

    .cmd-tag {
      font-size: .72rem;
      font-weight: 700;
      font-family: monospace;
      letter-spacing: .05em;
      background: rgba(124, 111, 205, .18);
      color: var(--accent);
      padding: .2rem .55rem;
      border-radius: 4px;
      white-space: nowrap;
    }

    .cmd-desc { font-size: .85rem; color: var(--muted); flex: 1; }

    .chevron {
      width: 16px; height: 16px;
      color: var(--muted);
      transition: transform .2s;
      flex-shrink: 0;
    }
    .cmd-card.open .chevron { transform: rotate(180deg); }

    .cmd-body { display: none; padding: 1.1rem 1.2rem; }
    .cmd-card.open .cmd-body { display: block; }

    /* ── Campos dentro do card ───────────────────────────────────────────── */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .35rem;
    }

    .badge-name {
      background: rgba(88, 101, 242, .2);
      color: var(--accent2);
      font-size: .68rem;
      padding: .1rem .4rem;
      border-radius: 3px;
      font-weight: 700;
    }

    .badge-msg {
      background: rgba(59, 165, 92, .15);
      color: #3ba55c;
      font-size: .68rem;
      padding: .1rem .4rem;
      border-radius: 3px;
      font-weight: 700;
    }

    .input-name, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .5rem .75rem;
      color: var(--text);
      font-size: .9rem;
      font-family: monospace;
      outline: none;
      transition: border-color .15s;
      resize: vertical;
    }
    .input-name:focus, textarea:focus { border-color: var(--accent); }

    textarea { min-height: 56px; line-height: 1.4; }

    .hint {
      font-size: .73rem;
      color: var(--muted);
      margin-top: .3rem;
      font-style: italic;
    }

    /* ── Vars disponíveis ────────────────────────────────────────────────── */
    .vars {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
      margin-top: .3rem;
    }

    .var-chip {
      font-family: monospace;
      font-size: .73rem;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .1rem .4rem;
      color: var(--muted);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: .9rem 0;
    }

    /* ── Loading ─────────────────────────────────────────────────────────── */
    .loading {
      text-align: center;
      color: var(--muted);
      padding: 4rem 2rem;
      font-size: .95rem;
    }

    /* ── Seção Voz ───────────────────────────────────────────────────────── */
    .voz-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.3rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      max-width: 680px;
      margin-right: auto;
    }

    .voz-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .voz-label {
      font-size: .82rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      min-width: 130px;
    }

    .voz-section-title {
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: .4rem;
    }

    /* Botão microfone */
    .mic-btn {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: none;
      background: var(--accent2);
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(88,101,242,.35);
    }
    .mic-btn svg { width: 32px; height: 32px; }
    .mic-btn:hover { background: #4752c4; transform: scale(1.06); }
    .mic-btn:active { transform: scale(.96); }
    .mic-btn.recording {
      background: var(--error);
      box-shadow: 0 0 0 6px rgba(237,66,69,.25), 0 4px 16px rgba(237,66,69,.4);
      animation: pulse-rec .9s infinite;
    }
    .mic-btn.processing {
      background: #555;
      box-shadow: none;
      cursor: default;
    }
    @keyframes pulse-rec {
      0%,100% { box-shadow: 0 0 0 6px rgba(237,66,69,.25), 0 4px 16px rgba(237,66,69,.4); }
      50%      { box-shadow: 0 0 0 12px rgba(237,66,69,.1), 0 4px 16px rgba(237,66,69,.4); }
    }

    .voz-status {
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
    }

    .voz-transcript, .voz-response {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .65rem .9rem;
      font-size: .9rem;
      color: var(--text);
      min-height: 2.4rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .voz-transcript { color: var(--muted); font-style: italic; }
    .voz-response { color: var(--text); }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: .75rem; }
    .toggle { position: relative; width: 46px; height: 26px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #3a3d4e;
      border-radius: 26px;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--success); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* Sliders */
    .voz-slider-wrap { display: flex; align-items: center; gap: .7rem; flex: 1; min-width: 200px; }
    .voz-slider {
      flex: 1;
      appearance: none;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    .voz-slider::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: background .15s;
    }
    .voz-slider:hover::-webkit-slider-thumb { background: var(--accent2); }
    .voz-slider-val {
      font-size: .82rem;
      font-family: monospace;
      color: var(--text);
      min-width: 32px;
      text-align: right;
    }

    /* Select nativo mantido apenas como estado do formulário */
    .voz-select {
      appearance: none;
      -webkit-appearance: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .4rem 2rem .4rem .7rem;
      color: var(--text);
      font-size: .88rem;
      outline: none;
      cursor: pointer;
      transition: border-color .15s;
      width: auto;
      min-width: 7.5rem;
      max-width: 100%;
      background-image:
        linear-gradient(45deg, transparent 50%, currentColor 50%),
        linear-gradient(135deg, currentColor 50%, transparent 50%);
      background-position:
        calc(100% - 15px) 50%,
        calc(100% - 10px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
    }
    .voz-select::-ms-expand { display: none; }
    .voz-select:focus { border-color: var(--accent); }

    .voz-select.custom-native-select {
      position: absolute;
      width: 1px !important;
      height: 1px !important;
      min-width: 0 !important;
      opacity: 0;
      pointer-events: none;
    }

    /* Dropdown customizado */
    .custom-select {
      position: relative;
      display: inline-block;
      min-width: 7.5rem;
      max-width: 100%;
      vertical-align: middle;
      font-size: .88rem;
      z-index: 1;
    }
    .custom-select.open { z-index: 99990; }
    .custom-select-trigger {
      width: 100%;
      min-height: 37px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .75rem;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.11);
      background:
        linear-gradient(135deg, rgba(255,255,255,.07), rgba(255,255,255,.025)),
        rgba(4,7,18,.64);
      color: var(--text);
      padding: .4rem .58rem .4rem .76rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 10px 24px rgba(0,0,0,.18);
      cursor: pointer;
      user-select: none;
      outline: none;
      transition: border-color .16s, box-shadow .16s, background .16s, transform .12s;
    }
    .custom-select-trigger:hover,
    .custom-select.open .custom-select-trigger {
      border-color: rgba(34,211,238,.55);
      box-shadow: 0 0 0 4px rgba(34,211,238,.08), inset 0 1px 0 rgba(255,255,255,.08), 0 16px 34px rgba(0,0,0,.24);
    }
    .custom-select-trigger:active { transform: translateY(1px); }
    .custom-select-label {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .custom-select-arrow {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      background: rgba(167,139,250,.13);
      color: var(--accent3);
      transition: transform .18s, background .16s, color .16s;
    }
    .custom-select-arrow::before {
      content: '';
      width: 7px;
      height: 7px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: translateY(-2px) rotate(45deg);
    }
    .custom-select.open .custom-select-arrow {
      transform: rotate(180deg);
      background: rgba(34,211,238,.16);
      color: #fff;
    }
    .custom-select-menu {
      position: absolute;
      left: 0;
      top: calc(100% + 8px);
      width: max(100%, 14rem);
      max-width: min(520px, calc(100vw - 32px));
      max-height: 260px;
      overflow: auto;
      z-index: 99999;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 16px;
      background:
        radial-gradient(circle at 12% 0%, rgba(167,139,250,.16), transparent 34%),
        linear-gradient(145deg, rgba(24,29,52,.98), rgba(7,10,22,.98));
      backdrop-filter: blur(18px) saturate(140%);
      box-shadow: 0 24px 70px rgba(0,0,0,.44), inset 0 1px 0 rgba(255,255,255,.08);
      padding: .35rem;
      opacity: 0;
      transform: translateY(-6px) scale(.98);
      pointer-events: none;
      transition: opacity .16s ease, transform .16s ease;
    }
    .custom-select-menu.custom-select-menu-portal {
      position: fixed;
      width: var(--custom-select-menu-width, 14rem);
      left: var(--custom-select-menu-left, 16px);
      top: var(--custom-select-menu-top, 16px);
      z-index: 999999;
    }
    .custom-select.open .custom-select-menu,
    .custom-select-menu.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }
    .custom-select-menu::-webkit-scrollbar { width: 6px; }
    .custom-select-menu::-webkit-scrollbar-track { background: transparent; }
    .custom-select-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,.18); border-radius: 999px; }
    .custom-select-option {
      display: flex;
      align-items: center;
      gap: .5rem;
      min-height: 34px;
      padding: .42rem .62rem;
      border-radius: 12px;
      color: #dbe3ff;
      white-space: nowrap;
      cursor: pointer;
      transition: background .13s, color .13s, transform .1s;
    }
    .custom-select-option:hover {
      background: rgba(255,255,255,.08);
      color: #fff;
    }
    .custom-select-option.selected {
      background: linear-gradient(135deg, rgba(109,124,255,.30), rgba(34,211,238,.15));
      color: #fff;
    }
    .custom-select-option.selected::before {
      content: '✓';
      color: var(--accent3);
      font-weight: 800;
    }
    .custom-select-option.disabled {
      opacity: .48;
      cursor: default;
    }

    .voz-save-btn {
      padding: .38rem 1rem;
      border-radius: 6px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
      align-self: flex-end;
    }
    .voz-save-btn:hover { opacity: .82; }
    .voz-save-btn:disabled {
      opacity: .35;
      cursor: not-allowed;
    }
    .voz-save-btn.gravando {
      background: var(--error);
      animation: pulso-rec .9s ease-in-out infinite alternate;
    }
    @keyframes pulso-rec {
      from { box-shadow: 0 0 0px var(--error); }
      to   { box-shadow: 0 0 10px var(--error); }
    }

    /* ── Chat de Voz ─────────────────────────────────────────────────────── */
    .voice-chat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .voice-chat-messages {
      flex: 1;
      min-height: 200px;
      max-height: 420px;
      overflow-y: auto;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }
    .voice-chat-messages::-webkit-scrollbar { width: 6px; }
    .voice-chat-messages::-webkit-scrollbar-track { background: transparent; }
    .voice-chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .voice-msg {
      max-width: 85%;
      padding: .55rem .9rem;
      border-radius: 12px;
      font-size: .9rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .voice-msg.user {
      align-self: flex-end;
      background: var(--accent2);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .voice-msg.bot {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .voice-msg .msg-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      opacity: .7;
      margin-bottom: .2rem;
    }

    .voice-chat-empty {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: .88rem;
    }

    .voice-chat-bar {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .8rem 1.2rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }

    .input-action-wrap {
      position: relative;
      min-width: 0;
      flex: 1;
    }

    .voice-chat-input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .5rem 3.35rem .5rem 3.05rem;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    .voice-chat-input:focus { border-color: var(--accent); }
    .voice-chat-input::placeholder { color: var(--muted); }

    .voice-send-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--accent3);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: color .15s, transform .15s, opacity .15s;
      flex-shrink: 0;
    }
    .voice-send-btn:hover { color: #fff; transform: translateY(-50%) scale(1.08); }
    .voice-send-btn:active { transform: translateY(-50%) scale(.94); }
    .voice-send-btn:disabled { opacity: .35; cursor: not-allowed; }

    .voice-clear-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .78rem;
      cursor: pointer;
      transition: color .15s, border-color .15s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .voice-clear-btn:hover { color: var(--error); border-color: var(--error); }

    /* ── Voice Chat Header ──────────────────────────────────────────────── */
    .voice-chat-header {
      display: flex;
      align-items: center;
      gap: .9rem;
      padding: .9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,.12);
    }

    .voice-chat-header-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));

    /* ── Botão microfone (barra de input) ─────────────────────────────────── */
    .voice-mic-small {

    /* ── Envio de mensagens para canais de texto ─────────────────────────── */
    .text-dispatch-card {

    /* ── Modernização visual ─────────────────────────────────────────────── */

</head>

<div class="app">

  <header>

<!-- Toast -->

<script>

// Estado atual da config
let _config = null;
let _guilds = [];

// ── Carrega config do servidor ──────────────────────────────────────────────
async function carregar() {
  try {
    const [rCfg, rGuilds] = await Promise.all([
      fetch('/api/config'),
      fetch('/api/guilds'),
    ]);
    _config = await rCfg.json();
    _guilds = await rGuilds.json().catch(() => []);
    renderizar(_config);
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="loading">Erro ao conectar ao servidor local. Verifique se o bot está rodando.</div>';
  }
}

// ── Renderiza o formulário ──────────────────────────────────────────────────
function renderizar(cfg) {
  const el = document.getElementById('content');
  el.className = '';
  el.innerHTML = '';

  // Prefixo mantido de forma oculta para preservar a lógica de salvar config
  el.innerHTML += `<input id="inp-prefix" type="hidden" value="${esc(cfg.prefix)}" />`;

  // ── Voz ──────────────────────────────────────────
  el.innerHTML += renderizarVoz();
  if (_guilds && _guilds.length) setTimeout(carregarCanaisVoz, 100);

  // ── Envio de mensagem em canais de texto ─────────
  el.innerHTML += renderizarEnvioTexto();
  if (_guilds && _guilds.length) setTimeout(carregarCanaisTexto, 100);

  // ── Chat de Voz ──────────────────────────────────
  el.innerHTML += renderizarChatVoz();
  setTimeout(inicializarChatVoz, 100);

  // ── Comandos ─────────────────────────────────────
  el.innerHTML += `<div class="section-title" style="margin-top:2rem">Comandos</div>
  <div class="cmd-grid" id="cmd-grid"></div>`;

  const grid = el.querySelector('#cmd-grid');

  for (const [cmdKey, cmdData] of Object.entries(cfg.commands)) {
    const card = document.createElement('div');
    card.className = 'cmd-card';
    card.dataset.key = cmdKey;

    // Cabeçalho do card (somente leitura)
    card.innerHTML = `
      <div class="cmd-header">
        <span class="cmd-tag">${esc(cfg.prefix)}${esc(cmdData.name)}</span>
        <span class="cmd-desc">${esc(cmdData.descricao || '')}</span>
      </div>`;

    grid.appendChild(card);
  }

  setTimeout(ajustarTodosSelects, 0);
}

// ── Selects com largura dinâmica ───────────────────────────────────────────
let _selectMeasureCanvas = null;
let _customSelectId = 0;
let _customSelectAberto = null;

function obterMenuCustomSelect(custom) {
  if (!custom) return null;
  const id = custom.dataset.customSelectId;
  return document.querySelector(`.custom-select-menu[data-custom-select-menu="${id}"]`) || custom.querySelector('.custom-select-menu');
}

function posicionarMenuCustomSelect(custom) {
  const menu = obterMenuCustomSelect(custom);
  const trigger = custom?.querySelector('.custom-select-trigger');
  if (!menu || !trigger || !custom.classList.contains('open')) return;

  if (menu.parentElement !== document.body) {
    document.body.appendChild(menu);
    menu.classList.add('custom-select-menu-portal');
  }

  const rect = trigger.getBoundingClientRect();
  const margem = 12;
  const largura = Math.min(Math.max(rect.width, 224), window.innerWidth - (margem * 2));
  let left = Math.min(Math.max(rect.left, margem), window.innerWidth - largura - margem);
  let top = rect.bottom + 8;

  const alturaEstimada = Math.min(menu.scrollHeight || 260, 260);
  if (top + alturaEstimada > window.innerHeight - margem && rect.top > alturaEstimada + margem) {
    top = Math.max(margem, rect.top - alturaEstimada - 8);
  }

  menu.style.setProperty('--custom-select-menu-width', `${largura}px`);
  menu.style.setProperty('--custom-select-menu-left', `${left}px`);
  menu.style.setProperty('--custom-select-menu-top', `${top}px`);
}

function medirTextoSelect(select, texto) {
  if (!_selectMeasureCanvas) _selectMeasureCanvas = document.createElement('canvas');
  const ctx = _selectMeasureCanvas.getContext('2d');
  const custom = select.nextElementSibling?.classList?.contains('custom-select') ? select.nextElementSibling : null;
  const st = getComputedStyle(custom || select);
  ctx.font = `${st.fontStyle} ${st.fontVariant} ${st.fontWeight} ${st.fontSize} / ${st.lineHeight} ${st.fontFamily}`;
  return ctx.measureText(texto || '').width;
}

function ajustarSelectLargura(select) {
  if (!select || select.tagName !== 'SELECT') return;
  inicializarCustomSelect(select);
  const option = select.options[select.selectedIndex] || select.options[0];
  const texto = option ? option.textContent.trim() : '';
  const custom = select.nextElementSibling?.classList?.contains('custom-select') ? select.nextElementSibling : null;
  const st = getComputedStyle(custom || select);
  const extra = 74;
  const largura = Math.ceil(medirTextoSelect(select, texto) + extra);
  const min = parseFloat(st.minWidth) || 0;
  const alvo = custom || select;
  alvo.style.width = `${Math.max(min, largura)}px`;
  atualizarCustomSelect(select);
}

function ajustarTodosSelects(root = document) {
  root.querySelectorAll('select').forEach(select => {
    inicializarCustomSelect(select);
    ajustarSelectLargura(select);
  });
}

function inicializarCustomSelect(select) {
  if (!select || select.tagName !== 'SELECT') return;
  let custom = select.nextElementSibling;
  if (!custom || !custom.classList.contains('custom-select')) {
    custom = document.createElement('div');
    const id = `cs-${++_customSelectId}`;
    custom.className = 'custom-select';
    custom.dataset.customSelectId = id;
    custom.innerHTML = `
      <button type="button" class="custom-select-trigger" aria-haspopup="listbox" aria-expanded="false">
        <span class="custom-select-label"></span>
        <span class="custom-select-arrow" aria-hidden="true"></span>
      </button>
      <div class="custom-select-menu" role="listbox" data-custom-select-menu="${id}"></div>`;
    select.insertAdjacentElement('afterend', custom);
    select.classList.add('custom-native-select');

    const trigger = custom.querySelector('.custom-select-trigger');
    trigger.addEventListener('click', e => {
      e.stopPropagation();
      const aberto = custom.classList.contains('open');
      fecharCustomSelects();
      if (!aberto) abrirCustomSelect(select);
    });
    trigger.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        trigger.click();
      } else if (e.key === 'Escape') {
        fecharCustomSelects();
      }
    });
  }
  atualizarCustomSelect(select);
}

function atualizarCustomSelect(select) {
  const custom = select?.nextElementSibling?.classList?.contains('custom-select') ? select.nextElementSibling : null;
  if (!custom) return;
  const option = select.options[select.selectedIndex] || select.options[0];
  const label = custom.querySelector('.custom-select-label');
  const menu = obterMenuCustomSelect(custom);
  const trigger = custom.querySelector('.custom-select-trigger');
  if (label) label.textContent = option ? option.textContent.trim() : '';
  if (trigger) trigger.setAttribute('aria-expanded', custom.classList.contains('open') ? 'true' : 'false');
  if (!menu) return;
  menu.innerHTML = [...select.options].map(opt => {
    const selected = opt.value === select.value;
    return `<div class="custom-select-option${selected ? ' selected' : ''}${opt.disabled ? ' disabled' : ''}" role="option" aria-selected="${selected ? 'true' : 'false'}" data-value="${esc(opt.value)}">${esc(opt.textContent.trim())}</div>`;
  }).join('');
  menu.querySelectorAll('.custom-select-option').forEach(item => {
    item.addEventListener('click', e => {
      e.stopPropagation();
      if (item.classList.contains('disabled')) return;
      select.value = item.dataset.value || '';
      select.dispatchEvent(new Event('change', { bubbles: true }));
      atualizarCustomSelect(select);
      fecharCustomSelects();
    });
  });
}

function abrirCustomSelect(select) {
  const custom = select?.nextElementSibling?.classList?.contains('custom-select') ? select.nextElementSibling : null;
  if (!custom) return;
  atualizarCustomSelect(select);
  custom.classList.add('open');
  _customSelectAberto = custom;
  const menu = obterMenuCustomSelect(custom);
  if (menu) menu.classList.add('open');
  posicionarMenuCustomSelect(custom);
  custom.querySelector('.custom-select-trigger')?.setAttribute('aria-expanded', 'true');
  const selected = menu?.querySelector('.custom-select-option.selected');
  if (selected) selected.scrollIntoView({ block: 'nearest' });
}

function fecharCustomSelects() {
  document.querySelectorAll('.custom-select.open').forEach(custom => {
    custom.classList.remove('open');
    obterMenuCustomSelect(custom)?.classList.remove('open');
    custom.querySelector('.custom-select-trigger')?.setAttribute('aria-expanded', 'false');
  });
  _customSelectAberto = null;
}

document.addEventListener('click', fecharCustomSelects);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') fecharCustomSelects();
});
window.addEventListener('resize', () => posicionarMenuCustomSelect(_customSelectAberto));
window.addEventListener('scroll', () => posicionarMenuCustomSelect(_customSelectAberto), true);

document.addEventListener('change', e => {
  if (e.target && e.target.tagName === 'SELECT') {
    ajustarSelectLargura(e.target);
  }
});

async function carregarCanaisTexto() {
  const guildSel = document.getElementById('texto-guild');
  const canalSel = document.getElementById('texto-canal');
  if (!guildSel || !canalSel) return;
  ajustarSelectLargura(guildSel);
  const guildId = guildSel.value;
  if (!guildId) return;
  canalSel.innerHTML = '<option value="">Carregando...</option>';
  ajustarSelectLargura(canalSel);
  try {
    const r = await fetch(`/api/texto/canais?guild_id=${guildId}`);
    const canais = await r.json();
    if (!Array.isArray(canais) || !canais.length) {
      canalSel.innerHTML = '<option value="">Nenhum canal disponível</option>';
    } else {
      canalSel.innerHTML = canais.map(c => {
        const categoria = c.category && c.category !== 'Sem categoria' ? `${esc(c.category)} / ` : '';
        return `<option value="${esc(c.id)}">${categoria}#${esc(c.name)}</option>`;
      }).join('');
    }
  } catch(e) {
    canalSel.innerHTML = '<option value="">Erro ao carregar</option>';
  }
  ajustarSelectLargura(canalSel);
}

async function enviarMensagemServidor() {
  const guildId = document.getElementById('texto-guild')?.value;
  const channelId = document.getElementById('texto-canal')?.value;
  const input = document.getElementById('texto-msg-input');
  const btn = document.getElementById('texto-send-btn');
  const texto = input?.value?.trim();
  if (!guildId || !channelId) { toast('Selecione servidor e canal de texto.', 'err'); return; }
  if (!texto) { toast('Digite uma mensagem para enviar.', 'err'); return; }
  if (btn) btn.disabled = true;
  try {
    const r = await fetch('/api/texto/enviar', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ guild_id: guildId, channel_id: channelId, texto }),
    });
    const res = await r.json();
    if (res.ok) {
      if (input) input.value = '';
      toast('Mensagem enviada pelo bot!', 'ok');
    } else {
      toast('Erro: ' + (res.erro || '?'), 'err');
    }
  } catch(e) {
    toast('Falha ao enviar mensagem: ' + e.message, 'err');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function carregarCanaisVoz() {
  const guildSel = document.getElementById('voz-guild');
  const canalSel = document.getElementById('voz-canal');
  if (!guildSel || !canalSel) return;
  ajustarSelectLargura(guildSel);
  const guildId = guildSel.value;
  if (!guildId) return;
  canalSel.innerHTML = '<option value="">Carregando...</option>';
  ajustarSelectLargura(canalSel);
  try {
    const r = await fetch(`/api/voz/canais?guild_id=${guildId}`);
    const canais = await r.json();
    if (!canais.length) {
      canalSel.innerHTML = '<option value="">Nenhum canal de voz</option>';
    } else {
      canalSel.innerHTML = canais.map(c => `<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('');
    }
    // Reflete estado atual (bot já conectado?)
    const guild = (_guilds || []).find(g => g.id === guildId);
    const btnCon = document.getElementById('voz-btn-conectar');
    const btnDis = document.getElementById('voz-btn-desconectar');
    if (guild?.canal_id) {
      const opt = [...canalSel.options].find(o => o.value === guild.canal_id);
      if (opt) canalSel.value = guild.canal_id;
      if (btnCon) btnCon.style.display = 'none';
      if (btnDis) btnDis.style.display = '';
    } else {
      if (btnCon) btnCon.style.display = '';
      if (btnDis) btnDis.style.display = 'none';
    }
  } catch(e) {
    canalSel.innerHTML = '<option value="">Erro ao carregar</option>';
  }
  ajustarSelectLargura(canalSel);
}

async function conectarVoz() {
  const guildId   = document.getElementById('voz-guild')?.value;
  const channelId = document.getElementById('voz-canal')?.value;
  if (!guildId || !channelId) { toast('Selecione um canal de voz.', 'err'); return; }
  const btn = document.getElementById('voz-btn-conectar');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch('/api/voz/conectar', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ guild_id: guildId, channel_id: channelId }),
    });
    const res = await r.json();
    if (res.ok) {
      const g = (_guilds || []).find(g => g.id === guildId);
      if (g) { g.em_voz = true; g.canal_id = channelId; }
      if (btn) { btn.style.display = 'none'; btn.disabled = false; }
      const dis = document.getElementById('voz-btn-desconectar');
      if (dis) dis.style.display = '';
      toast('Bot conectado ao canal de voz!', 'ok');
    } else {
      toast('Erro: ' + (res.erro || '?'), 'err');
      if (btn) btn.disabled = false;
    }
  } catch(e) {
    toast('Falha ao conectar: ' + e.message, 'err');
    if (btn) btn.disabled = false;
  }
}

async function desconectarVoz() {
  const guildId = document.getElementById('voz-guild')?.value;
  if (!guildId) return;
  const btn = document.getElementById('voz-btn-desconectar');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch('/api/voz/desconectar', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ guild_id: guildId }),
    });
    const res = await r.json();
    if (res.ok) {
      const g = (_guilds || []).find(g => g.id === guildId);
      if (g) { g.em_voz = false; g.canal_id = null; }
      if (btn) { btn.style.display = 'none'; btn.disabled = false; }
      const con = document.getElementById('voz-btn-conectar');
      if (con) con.style.display = '';
      toast('Bot desconectado do canal de voz.', 'ok');
    } else {
      toast('Erro: ' + (res.erro || '?'), 'err');
      if (btn) btn.disabled = false;
    }
  } catch(e) {
    toast('Falha ao desconectar: ' + e.message, 'err');
    if (btn) btn.disabled = false;
  }
}

function atualizarInstructVoz() {

// ── Gravação de áudio via AudioContext (sem FFmpeg) ──────────────────────────
async function toggleGravacao() {
  if (_vozProcessing) return;
  if (_vozRecording) {
    pararGravacao();
  } else {
    await iniciarGravacao();
  }
}

async function iniciarGravacao() {
  try {
    _vozMediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        channelCount: 1,
      }
    });
    _vozAudioCtx = new AudioContext();
    _vozSourceNode = _vozAudioCtx.createMediaStreamSource(_vozMediaStream);
    _vozProcessorNode = _vozAudioCtx.createScriptProcessor(4096, 1, 1);
    _vozGainNode = _vozAudioCtx.createGain();
    _vozGainNode.gain.value = 0;
    _vozChunks = [];

    _vozProcessorNode.onaudioprocess = (e) => {
      if (_vozRecording) {
        _vozChunks.push(new Float32Array(e.inputBuffer.getChannelData(0)));
      }
    };

    _vozSourceNode.connect(_vozProcessorNode);
    _vozProcessorNode.connect(_vozGainNode);
    _vozGainNode.connect(_vozAudioCtx.destination);
    _vozRecording = true;

    const btn = document.getElementById('voice-mic-btn');
    if (btn) btn.classList.add('recording');
    setVoiceStatus('Gravando...');
  } catch(e) {
    toast('Erro ao acessar microfone: ' + e.message, 'err');
  }
}

async function pararGravacao() {
  _vozRecording = false;
  _vozProcessing = true;

  const btn = document.getElementById('voice-mic-btn');
  if (btn) { btn.classList.remove('recording'); btn.classList.add('processing'); }
  setVoiceStatus('Processando...');

  // Limpa áudio
  if (_vozProcessorNode) _vozProcessorNode.disconnect();
  if (_vozGainNode) _vozGainNode.disconnect();
  if (_vozSourceNode) _vozSourceNode.disconnect();
  if (_vozMediaStream) _vozMediaStream.getTracks().forEach(t => t.stop());

  // Merge chunks
  const totalLen = _vozChunks.reduce((a, c) => a + c.length, 0);
  if (totalLen < 1600) { // muito curto
    _vozProcessing = false;
    if (btn) btn.classList.remove('processing');
    setVoiceStatus('');
    return;
  }

  const merged = new Float32Array(totalLen);
  let offset = 0;
  for (const ch of _vozChunks) { merged.set(ch, offset); offset += ch.length; }
  _vozChunks = [];

  // Codifica como WAV
  const sampleRate = _vozAudioCtx ? _vozAudioCtx.sampleRate : 44100;
  const tratado = preprocessarAudioMic(merged, sampleRate);
  if (!tratado || tratado.length < sampleRate * 0.20) {
    _vozProcessing = false;
    if (btn) btn.classList.remove('processing');
    setVoiceStatus('');
    if (_vozAudioCtx) { _vozAudioCtx.close(); _vozAudioCtx = null; }
    toast('Não detectei fala suficiente.', 'err');
    return;
  }
  const wavBlob = encodeWAV(tratado, sampleRate);
  if (_vozAudioCtx) { _vozAudioCtx.close(); _vozAudioCtx = null; }

  // Envia ao servidor
  try {
    setVoiceStatus('Transcrevendo e gerando resposta...');
    const r = await fetch('/api/voz/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'audio/wav' },
      body: wavBlob,
    });
    const res = await r.json();
    if (res.transcript) adicionarMsgChat('user', res.transcript);
    if (res.resposta) adicionarMsgChat('bot', res.resposta);
    if (res.falou_discord) setVoiceStatus('Falando no Discord...');
    else setVoiceStatus('');
  } catch(e) {
    toast('Erro no chat de voz: ' + e.message, 'err');
    setVoiceStatus('');
  }

  _vozProcessing = false;
  if (btn) btn.classList.remove('processing');
  setTimeout(() => setVoiceStatus(''), 3000);
}

// ── Enviar texto digitado ───────────────────────────────────────────────────
async function enviarTextoVoz() {
  const input = document.getElementById('voice-chat-input');
  const texto = input?.value?.trim();
  if (!texto || _vozProcessing) return;

  input.value = '';
  _vozProcessing = true;
  adicionarMsgChat('user', texto);
  setVoiceStatus('Gerando resposta...');

  const sendBtn = document.getElementById('voice-send-btn');
  if (sendBtn) sendBtn.disabled = true;

  try {
    const r = await fetch('/api/voz/chat-texto', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ texto }),
    });
    const res = await r.json();
    if (res.resposta) adicionarMsgChat('bot', res.resposta);
    if (res.falou_discord) setVoiceStatus('Falando no Discord...');
    else if (res.erro) toast('Erro: ' + res.erro, 'err');
    else setVoiceStatus('');
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  }

  _vozProcessing = false;
  if (sendBtn) sendBtn.disabled = false;
  setTimeout(() => setVoiceStatus(''), 3000);
}

function adicionarMsgChat(role, texto) {
  const container = document.getElementById('voice-chat-msgs');

  const div = document.createElement('div');

// ── Push-to-Talk ────────────────────────────────────────────────────────────
let _pttPollInterval = null;
let _pttGlobalAnterior = false;  // estado anterior do PTT global

function togglePTT() {
  _pttEnabled = !_pttEnabled;
  const btn = document.getElementById('ptt-toggle');
  const label = document.getElementById('ptt-label');
  if (btn) btn.classList.toggle('active', _pttEnabled);
  if (label) label.textContent = _pttEnabled ? 'PTT ON' : 'PTT';
  if (_pttEnabled) {
    toast('Push-to-Talk ativado — (Shift direito)', 'ok');
    _iniciarPollingPTT();
  } else {
    toast('Push-to-Talk desativado', 'ok');
    _pararPollingPTT();
    if (_pttKeyHeld && _vozRecording) {
      _pttKeyHeld = false;
      pararGravacao();
    }
  }
}

function _iniciarPollingPTT() {
  if (_pttPollInterval) return;
  _pttGlobalAnterior = false;
  _pttPollInterval = setInterval(async () => {
    if (!_pttEnabled) return;
    try {
      const r = await fetch('/api/voz/ptt-estado');
      const data = await r.json();
      const agora = data.pressionado;
      if (agora && !_pttGlobalAnterior && !_pttKeyHeld && !_vozProcessing) {
        _pttKeyHeld = true;
        iniciarGravacao();
      } else if (!agora && _pttGlobalAnterior && _pttKeyHeld) {
        _pttKeyHeld = false;
        if (_vozRecording) pararGravacao();
      }
      _pttGlobalAnterior = agora;
    } catch(e) {}
  }, 100);
}

function _pararPollingPTT() {
  if (_pttPollInterval) {
    clearInterval(_pttPollInterval);
    _pttPollInterval = null;
  }
  _pttGlobalAnterior = false;
}

document.addEventListener('keydown', (e) => {
  if (!_pttEnabled || _pttKeyHeld || _vozProcessing) return;
  if (e.code === 'ShiftRight') {
    e.preventDefault();
    _pttKeyHeld = true;
    iniciarGravacao();
  }
});

document.addEventListener('keyup', (e) => {
  if (!_pttEnabled || !_pttKeyHeld) return;
  if (e.code === 'ShiftRight') {
    e.preventDefault();
    _pttKeyHeld = false;
    if (_vozRecording) pararGravacao();
  }
});

function preprocessarAudioMic(samples, sampleRate) {
  if (!samples || !samples.length) return samples;
  const frame = Math.max(256, Math.floor(sampleRate * 0.03));
  const hop = Math.max(128, Math.floor(sampleRate * 0.01));
  const rms = [];
  for (let i = 0; i + frame <= samples.length; i += hop) {
    let sum = 0;
    for (let j = 0; j < frame; j++) sum += samples[i + j] * samples[i + j];
    rms.push(Math.sqrt(sum / frame));
  }
  if (!rms.length) return samples;
  const ordenado = [...rms].sort((a, b) => a - b);
  const noise = ordenado[Math.floor(ordenado.length * 0.2)] || 0;
  const threshold = Math.max(0.012, noise * 3.0);
  let first = -1, last = -1;
  for (let i = 0; i < rms.length; i++) {
    if (rms[i] > threshold) { if (first < 0) first = i; last = i; }
  }
  if (first < 0) return new Float32Array(0);
  const pre = Math.floor(sampleRate * 0.18);
  const post = Math.floor(sampleRate * 0.25);
  const ini = Math.max(0, first * hop - pre);
  const fim = Math.min(samples.length, last * hop + frame + post);
  const cortado = samples.slice(ini, fim);

  let sum = 0, peak = 0;
  for (let i = 0; i < cortado.length; i++) {
    const v = cortado[i];
    sum += v * v;
    peak = Math.max(peak, Math.abs(v));
  }
  const audioRms = Math.sqrt(sum / Math.max(1, cortado.length));
  if (audioRms > 0 && peak > 0) {
    const gain = Math.min(0.08 / audioRms, 0.95 / peak, 8);
    if (gain > 1.05) {
      const out = new Float32Array(cortado.length);
      for (let i = 0; i < cortado.length; i++) out[i] = Math.max(-1, Math.min(1, cortado[i] * gain));
      return out;
    }
  }
  return cortado;
}

// ── Codificação WAV (sem FFmpeg) ────────────────────────────────────────────
function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);
  writeWAVStr(view, 0, 'RIFF');
  view.setUint32(4, 36 + samples.length * 2, true);
  writeWAVStr(view, 8, 'WAVE');
  writeWAVStr(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);   // PCM
  view.setUint16(22, 1, true);   // mono
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * 2, true);
  view.setUint16(32, 2, true);   // block align
  view.setUint16(34, 16, true);  // bits per sample
  writeWAVStr(view, 36, 'data');
  view.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  return new Blob([buffer], { type: 'audio/wav' });
}

function writeWAVStr(view, offset, str) {
  for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
}

// ── Cards de comando ─────────────────────────────────────────────────────────
function buildBody(cmdKey, cmdData) {
  let html = '';

  // Campo do nome do comando
  html += `
    <div class="field">
      <div class="field-label">
        Nome do comando
        <span class="badge-name">NOME</span>
      </div>
      <input class="input-name" type="text"
             data-cmd="${esc(cmdKey)}" data-field="name"
             value="${esc(cmdData.name)}" />
      <div class="hint">Texto que os usuários digitam após o prefixo. Reinício aplica ao Discord.</div>
    </div>`;

  if (Object.keys(cmdData.messages || {}).length > 0) {
    html += '<div class="divider"></div>';
  }

  // Campos de mensagem
  for (const [msgKey, msgVal] of Object.entries(cmdData.messages || {})) {
    const label = MSG_LABELS[msgKey] || msgKey;
    const vars  = MSG_VARS[msgKey] || [];
    const varHtml = vars.length
      ? `<div class="vars">${vars.map(v => `<span class="var-chip">${esc(v)}</span>`).join('')}</div>`
      : '';

    html += `
      <div class="field">
        <div class="field-label">
          ${esc(label)}
          <span class="badge-msg">MENSAGEM</span>
        </div>
        <textarea data-cmd="${esc(cmdKey)}" data-field="msg_${esc(msgKey)}"
                  rows="2">${esc(msgVal)}</textarea>
        ${varHtml ? `<div class="hint">Variáveis: ${varHtml}</div>` : ''}
      </div>`;
  }

  return html;
}

// ── Coleta os valores do formulário ────────────────────────────────────────
function coletar() {
  const nova = JSON.parse(JSON.stringify(_config)); // deep clone

  // Prefixo
  const pInput = document.getElementById('inp-prefix');
  if (pInput) nova.prefix = pInput.value.trim() || '!';

  // Campos dos cards
  document.querySelectorAll('[data-cmd]').forEach(el => {
    const cmdKey = el.dataset.cmd;
    const field  = el.dataset.field;

    if (field === 'name') {
      nova.commands[cmdKey].name = el.value.trim() || cmdKey;
    } else if (field.startsWith('msg_')) {
      const msgKey = field.slice(4);
      nova.commands[cmdKey].messages[msgKey] = el.value;
    }
  });

  return nova;
}

// ── Salva no servidor ──────────────────────────────────────────────────────
async function salvar() {
  const nova = coletar();
  try {
    const r = await fetch('/api/config', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(nova),
    });
    const res = await r.json();
    if (res.ok) {
      _config = nova;
      // Atualiza os tags de prefixo/nome nos headers sem re-renderizar tudo
      atualizarTags(nova);
      toast('Configurações salvas com sucesso!', 'ok');
    } else {
      toast('Erro ao salvar: ' + (res.erro || 'desconhecido'), 'err');
    }
  } catch(e) {
    toast('Falha de conexão com o servidor.', 'err');
  }
}

function atualizarTags(cfg) {
  document.querySelectorAll('.cmd-card').forEach(card => {
    const key = card.dataset.key;
    const tag = card.querySelector('.cmd-tag');
    if (tag && cfg.commands[key]) {
      tag.textContent = cfg.prefix + cfg.commands[key].name;
    }
  });
}

// ── Toggle card ────────────────────────────────────────────────────────────
function toggleCard(card) {
  card.classList.toggle('open');
}

// ── Desligar bot ───────────────────────────────────────────────────────────
async function desligar() {
  if (!confirm('Tem certeza que deseja desligar o bot?')) return;
  try {
    await fetch('/api/shutdown', { method: 'POST' });
    toast('Bot desligado.', 'err');
  } catch(e) {
    toast('Falha ao desligar.', 'err');
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────
let _toastTimer = null;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ── Escape HTML ────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function nomeArquivo(path) {
  return String(path || '').split(/[\\/]/).pop();
}

// ── Suporte a Ctrl+S ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    salvar();
  }
});
